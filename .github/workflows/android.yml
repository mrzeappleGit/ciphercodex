name: Android CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: gradle/actions/setup-gradle@v4

      # Forks and PRs from outside have no access to the signing secrets;
      # the gradle config falls back to an unsigned release build there.
      - name: Restore signing keystore
        if: ${{ github.event_name != 'pull_request' }}
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "$KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/release.jks"
            echo "KEYSTORE_FILE=$RUNNER_TEMP/release.jks" >> "$GITHUB_ENV"
          fi

      - name: Build and test
        working-directory: android
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug assembleRelease testDebugUnitTest

      - uses: actions/upload-artifact@v4
        with:
          name: ciphercodex-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk

      - uses: actions/upload-artifact@v4
        with:
          name: ciphercodex-release-apk
          path: android/app/build/outputs/apk/release/app-release.apk

      # Tagging vX.Y.Z publishes the signed release APK on a GitHub release.
      - name: Attach APK to release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          cp android/app/build/outputs/apk/release/app-release.apk "ciphercodex-${GITHUB_REF_NAME}.apk"
          gh release create "${GITHUB_REF_NAME}" --title "CipherCodex ${GITHUB_REF_NAME}" --generate-notes \
            "ciphercodex-${GITHUB_REF_NAME}.apk" \
            || gh release upload "${GITHUB_REF_NAME}" "ciphercodex-${GITHUB_REF_NAME}.apk" --clobber
