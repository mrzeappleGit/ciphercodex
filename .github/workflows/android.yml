name: Android CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: gradle/actions/setup-gradle@v4

      # Forks and PRs from outside have no access to the signing secrets;
      # the gradle config falls back to an unsigned release build there.
      - name: Restore signing keystore
        if: ${{ github.event_name != 'pull_request' }}
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "$KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/release.jks"
            echo "KEYSTORE_FILE=$RUNNER_TEMP/release.jks" >> "$GITHUB_ENV"
          fi

      - name: Build and test
        working-directory: android
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug assembleRelease testDebugUnitTest

      - uses: actions/upload-artifact@v4
        with:
          name: ciphercodex-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk

      - uses: actions/upload-artifact@v4
        with:
          name: ciphercodex-release-apk
          path: android/app/build/outputs/apk/release/app-release.apk

      # Every main build refreshes the rolling "latest" prerelease, so there is
      # always a login-free download link for the newest signed APK.
      - name: Update rolling latest release
        if: github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          cp android/app/build/outputs/apk/release/app-release.apk ciphercodex-latest.apk
          git push --force origin "HEAD:refs/tags/latest"
          gh release create latest --prerelease --title "Latest build" \
            --notes "Rolling build of the newest main commit. Prefer the versioned releases below for stable installs." \
            ciphercodex-latest.apk 2>/dev/null \
            || gh release upload latest ciphercodex-latest.apk --clobber

      # Bumping versionName in app/build.gradle.kts and pushing IS the release
      # ritual: the first main build of an unreleased version tags and
      # publishes it automatically.
      - name: Auto-release on version bump
        if: github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION=$(grep -oP 'versionName = "\K[^"]+' android/app/build.gradle.kts)
          if [ -n "$VERSION" ] && ! gh release view "v$VERSION" >/dev/null 2>&1; then
            cp android/app/build/outputs/apk/release/app-release.apk "ciphercodex-v$VERSION.apk"
            gh release create "v$VERSION" --target "$GITHUB_SHA" \
              --title "CipherCodex v$VERSION" --generate-notes \
              "ciphercodex-v$VERSION.apk"
          fi

      # Manually pushed tags still work as before.
      - name: Attach APK to release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          cp android/app/build/outputs/apk/release/app-release.apk "ciphercodex-${GITHUB_REF_NAME}.apk"
          gh release create "${GITHUB_REF_NAME}" --title "CipherCodex ${GITHUB_REF_NAME}" --generate-notes \
            "ciphercodex-${GITHUB_REF_NAME}.apk" \
            || gh release upload "${GITHUB_REF_NAME}" "ciphercodex-${GITHUB_REF_NAME}.apk" --clobber
