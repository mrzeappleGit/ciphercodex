name: Android CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: gradle/actions/setup-gradle@v4

      - name: Build APK and run unit tests
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug testDebugUnitTest

      - uses: actions/upload-artifact@v4
        with:
          name: ciphercodex-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk

      # Tagging vX.Y.Z publishes the APK on a GitHub release. Debug-keyed:
      # fine for sideloading; a Play-store build needs a signing keystore.
      - name: Attach APK to release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          cp android/app/build/outputs/apk/debug/app-debug.apk "ciphercodex-${GITHUB_REF_NAME}-debug.apk"
          gh release create "${GITHUB_REF_NAME}" --title "CipherCodex ${GITHUB_REF_NAME}" --generate-notes \
            "ciphercodex-${GITHUB_REF_NAME}-debug.apk" \
            || gh release upload "${GITHUB_REF_NAME}" "ciphercodex-${GITHUB_REF_NAME}-debug.apk" --clobber
